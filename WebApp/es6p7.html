<!--Encapsulation using Bank Account-->
<script>
    class BankAccount{
        #balance=0//private variable
        deposit(amount)
        {
            this.#balance+=amount;
        }
        getBalance()
        {
            return this.#balance
        }
    }
    const acc=new BankAccount();
    acc.deposit(1000);
    console.log(acc.getBalance());//1000
    //Not Allowed
    //console.log(acc.#balance);//Error
</script>
